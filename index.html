<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>Noir Auteur - Screening</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400..900;1,400..900&family=Manrope:wght@200..800&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "background": "#131313",
                        "surface": "#131313",
                        "surface-container-lowest": "#0e0e0e",
                        "surface-container-low": "#1c1b1b",
                        "surface-container": "#201f1f",
                        "surface-container-high": "#2a2a2a",
                        "surface-container-highest": "#353534",
                        "primary": "#f2ca50",
                        "primary-container": "#d4af37",
                        "on-primary": "#3c2f00",
                        "on-background": "#e5e2e1",
                        "on-surface": "#e5e2e1",
                        "on-surface-variant": "#d0c5af",
                        "outline-variant": "#4d4635"
                    },
                    "fontFamily": {
                        "headline": ["Noto Serif", "serif"],
                        "body": ["Manrope", "sans-serif"],
                        "label": ["Manrope", "sans-serif"],
                        "sans": ["Manrope", "sans-serif"],
                        "serif": ["Noto Serif", "serif"]
                    },
                    "backgroundImage": {
                        'film-grain': "url('data:image/svg+xml,%3Csvg viewBox=%220 0 200 200%22 xmlns=%22http://www.w3.org/2000/svg%22%3E%3Cfilter id=%22noiseFilter%22%3E%3CfeTurbulence type=%22fractalNoise%22 baseFrequency=%220.65%22 numOctaves=%223%22 stitchTiles=%22stitch%22/%3E%3C/filter%3E%3Crect width=%22100%25%22 height=%22100%25%22 filter=%22url(%23noiseFilter)%22 opacity=%220.05%22/%3E%3C/svg%3E')",
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: theme('colors.background');
            color: theme('colors.on-background');
            font-family: theme('fontFamily.body');
            /* Allow scrolling but keep it smooth */
            overflow-x: hidden;
            overflow-y: auto;
            user-select: none;
            -webkit-user-select: none;
        }
        h1, h2, h3, h4, h5, h6, .font-headline {
            font-family: theme('fontFamily.headline');
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Custom swipe card class */
        .movie-card {
            position: absolute;
            width: 85%;
            height: 95%;
            background-color: theme('colors.surface-container-highest');
            border-radius: 0.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            will-change: transform;
            cursor: grab;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.4s ease;
            display: flex;
            background-size: cover;
            background-position: center;
            border: 1px solid theme('colors.outline-variant' / 20%);
            user-select: none;
            -webkit-user-select: none;
        }
        .movie-card.moving {
            transition: none;
            cursor: grabbing;
        }
        /* Hint Wiggle Animation */
        @keyframes hint-wiggle {
            0%, 100% { transform: translate(0, 0) rotate(2deg); }
            25% { transform: translate(-20px, 0) rotate(-2deg); }
            75% { transform: translate(20px, 0) rotate(5deg); }
        }
        .hint-wiggle {
            animation: hint-wiggle 1s ease-in-out 2;
        }
        /* Pulse Animation for CTA Buttons */
        @keyframes pulse-glow {
            0% { box-shadow: 0 0 0 0 rgba(242, 202, 80, 0.4); transform: scale(1); }
            50% { box-shadow: 0 0 20px 10px rgba(242, 202, 80, 0); transform: scale(1.05); }
            100% { box-shadow: 0 0 0 0 rgba(242, 202, 80, 0); transform: scale(1); }
        }
        .animate-pulse-glow {
            animation: pulse-glow 2s infinite;
        }
        .cart-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #f43f5e;
            color: white;
            font-size: 10px;
            padding: 2px 5px;
            border-radius: 99px;
            font-weight: bold;
            display: none;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .cart-badge.pop {
            transform: scale(1.5);
        }
        
        @keyframes drift {
            0% { transform: scale(1.5) translate(0, 0); }
            50% { transform: scale(1.6) translate(-10px, 5px); }
            100% { transform: scale(1.5) translate(0, 0); }
        }
        .living-bg {
            animation: drift 20s ease-in-out infinite;
        }

        /* Cinematic Film Strip - Extremely Subdued Version */
        .film-strip {
            position: fixed;
            top: 0;
            width: 30px;
            height: 100%;
            background: rgba(13, 12, 11, 0.4);
            z-index: -10;
            opacity: 0.1;
            pointer-events: none;
            overflow: hidden;
        }
        
        .film-strip::before, .film-strip::after {
            content: '';
            position: absolute;
            left: 6px;
            width: 8px;
            height: 100%;
            background-image: radial-gradient(circle, #333 30%, transparent 40%);
            background-size: 8px 30px;
            animation: film-scroll 40s linear infinite;
        }
        .film-strip::after {
            left: auto;
            right: 6px;
        }
        
        @keyframes film-scroll {
            from { background-position: 0 0; }
            to { background-position: 0 1000px; }
        }

        .film-strip-left { left: 0; border-right: 1px solid rgba(255, 255, 255, 0.02); }
        .film-strip-right { right: 0; border-left: 1px solid rgba(255, 255, 255, 0.02); }
        /* Tutorial Arrows */
        .tutorial-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            color: theme('colors.primary');
            opacity: 0.6;
            z-index: 40;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }
        .tutorial-arrow.left { left: 5%; }
        .tutorial-arrow.right { right: 5%; }
        
        @keyframes bounce-x {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(10px); }
        }
        @keyframes bounce-x-rev {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(-10px); }
        }
        .bounce-right { animation: bounce-x 1s infinite; }
        .bounce-left { animation: bounce-x-rev 1s infinite; }
        .badge {
            position: absolute;
            top: 40px;
            padding: 5px 15px;
            border: 4px solid;
            border-radius: 10px;
            font-size: 2rem;
            font-weight: 800;
            text-transform: uppercase;
            opacity: 0;
            z-index: 10;
        }
        .badge.like {
            border-color: #10b981;
            color: #10b981;
            right: 40px;
            transform: rotate(15deg);
        }
        .badge.nope {
            border-color: #f43f5e;
            color: #f43f5e;
            left: 40px;
            transform: rotate(-15deg);
        }
    </style>
</head>
<body class="min-h-screen relative overflow-x-hidden bg-background">
    <!-- Film Grain Overlay -->
    <div class="fixed inset-0 pointer-events-none bg-film-grain mix-blend-overlay z-[100]"></div>
    
    <!-- Cinematic Film Strips -->
    <div class="film-strip film-strip-left"></div>
    <div class="film-strip film-strip-right"></div>
    
    <!-- TopNavBar -->
    <header class="fixed top-0 w-full bg-neutral-900/80 backdrop-blur-xl border-b border-white/5 flex justify-between items-center px-8 py-6 z-[60] hidden md:flex">
        <div class="text-2xl font-serif italic text-primary font-headline tracking-tighter uppercase font-extrabold">
            NOIR AUTEUR
        </div>
        <nav class="flex items-center gap-8 font-sans uppercase tracking-widest text-xs text-neutral-400">
            <a class="text-primary font-bold border-b border-primary pb-1 hover:text-yellow-400 transition-colors" href="#">استكشف</a>
        </nav>
        <div class="flex items-center gap-6 text-primary">
            <a id="btn-whatsapp-bag" class="relative hover:text-yellow-400 transition-colors p-2" href="https://wa.me/201124428203" target="_blank">
                <span class="material-symbols-outlined text-3xl" data-icon="shopping_bag">shopping_bag</span>
                <span id="cart-count" class="cart-badge">0</span>
            </a>
            <button id="btn-buy" data-track="true" class="bg-primary text-on-primary font-bold py-3 px-8 rounded-full hover:bg-primary-container transition-all animate-pulse-glow font-sans tracking-widest uppercase text-sm shadow-xl">
                شراء الأفلام
            </button>
        </div>
    </header>

    <!-- Main Content Canvas -->
    <main class="relative min-h-screen pt-0 md:pt-24 pb-24 flex items-center justify-center">
        <!-- Cinematic Spotlight Gradient -->
        <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-primary/15 via-background to-background opacity-60 z-0 pointer-events-none"></div>
        
        <div class="relative z-10 w-full max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 grid grid-cols-1 lg:grid-cols-2 gap-8 lg:gap-24 items-center h-full">
            
            <!-- Poster Stack (Visual Focus) -->
            <div id="cards-container" class="relative h-[65vh] lg:h-[819px] flex justify-center items-center" style="perspective: 1000px;">
                <!-- Background Poster (Out of focus) -->
                <div class="absolute w-[80%] h-[90%] transform -rotate-6 scale-95 opacity-40 blur-sm rounded-lg overflow-hidden shadow-2xl bg-surface-container-highest transition-all duration-700 ease-out z-0">
                    <img id="bg-blur-img" src="" class="w-full h-full object-cover grayscale living-bg" />
                    <div class="absolute inset-0 bg-black/60"></div>
                </div>
                
                <!-- Foreground Stack -->
                <div id="cards-stack" class="relative w-full h-full flex justify-center items-center z-10">
                    <!-- Cards injected via JS -->
                </div>

                <!-- Tutorial Arrows (Visible on load) -->
                <div id="tutorial-left" class="tutorial-arrow left lg:hidden">
                    <span class="material-symbols-outlined text-4xl bounce-left">arrow_back_ios</span>
                    <span class="text-[10px] uppercase tracking-tighter font-bold">تخطي</span>
                </div>
                <div id="tutorial-right" class="tutorial-arrow right lg:hidden">
                    <span class="material-symbols-outlined text-4xl bounce-right">arrow_forward_ios</span>
                    <span class="text-[10px] uppercase tracking-tighter font-bold">شراء</span>
                </div>
            </div>

            <!-- Marketing / Typography Focus -->
            <div class="flex flex-col items-start justify-center space-y-6 lg:space-y-8 z-20" id="marketing-panel">
                <div class="space-y-4">
                    <div class="flex flex-col gap-1">
                        <p class="font-sans text-primary tracking-[0.2em] text-xs lg:text-sm uppercase font-extrabold flex items-center gap-2">
                             <span class="w-2 h-2 bg-primary rounded-full animate-pulse"></span> حصرياً - أعلى جودة
                        </p>
                        <p class="text-neutral-400 text-[10px] md:text-sm font-medium uppercase tracking-[0.1em]">بأقل سعر رمزي | نوفر عليك عناء التحميل والانتظار</p>
                    </div>
                    <h1 id="movie-title" class="font-headline text-4xl sm:text-5xl md:text-6xl lg:text-7xl xl:text-[5.5rem] leading-[1.1] text-on-surface font-extrabold tracking-tighter mix-blend-lighten break-words py-2 uppercase drop-shadow-2xl">
                        LOADING...
                    </h1>
                </div>
                <div class="flex items-center gap-4 text-on-surface-variant font-sans text-sm lg:text-base tracking-widest uppercase font-medium">
                    <span id="movie-year">----</span>
                    <span class="w-1 h-1 bg-primary rounded-full"></span>
                    <span id="movie-runtime">--- MIN</span>
                    <span class="w-1 h-1 bg-primary rounded-full"></span>
                    <span id="movie-genre">-------</span>
                </div>
                <p id="movie-desc" class="font-sans text-on-surface-variant leading-relaxed max-w-lg text-base md:text-xl border-r border-primary/30 pr-6 h-[150px] overflow-y-auto pl-2 font-medium">
                    Loading cinematic details...
                </p>
                
                <div class="flex gap-4 pt-4 lg:pt-8 w-full justify-start items-center">
                    <!-- Swipe controls -->
                    <button id="btn-nope" data-track="true" class="bg-transparent border border-rose-500/30 text-rose-500 hover:bg-rose-500/10 font-bold w-14 h-14 rounded-full flex items-center justify-center transition-all duration-300">
                        <span class="material-symbols-outlined text-3xl">close</span>
                    </button>
                    <button id="btn-book" data-track="true" class="bg-primary text-on-primary font-body font-bold py-5 px-10 md:px-14 rounded-full hover:bg-primary-container transition-all duration-300 uppercase tracking-widest text-sm shadow-[0_0_50px_rgba(242,202,80,0.3)] flex items-center justify-center gap-3 animate-pulse-glow">
                        <span class="material-symbols-outlined" data-icon="confirmation_number">confirmation_number</span>
                        <span class="hidden sm:inline">اطلب الآن</span>
                        <span class="sm:hidden">اطلب</span>
                    </button>
                    <button id="btn-like" data-track="true" class="bg-transparent border border-emerald-500/30 text-emerald-500 hover:bg-emerald-500/10 font-bold w-14 h-14 rounded-full flex items-center justify-center transition-all duration-300">
                        <span class="material-symbols-outlined text-3xl">favorite</span>
                    </button>
                </div>
            </div>

        </div>
    </main>

    <!-- BottomNavBar (Mobile Only) -->
    <nav class="fixed bottom-0 w-full rounded-t-3xl shadow-2xl z-[60] flex justify-around p-4 md:hidden bg-neutral-900/90 backdrop-blur-lg border-t border-white/5">
        <a class="flex flex-col items-center justify-center bg-primary/10 text-primary rounded-xl p-2" href="#">
            <span class="material-symbols-outlined" data-icon="movie" style="font-variation-settings: 'FILL' 1;">movie</span>
            <span class="font-sans text-[10px] uppercase tracking-widest mt-1">العرض</span>
        </a>
        <a id="btn-ticket-window" class="flex flex-col items-center justify-center text-primary p-2 hover:bg-neutral-800 animate-pulse" href="https://wa.me/201124428203" target="_blank">
            <span class="material-symbols-outlined text-4xl">payments</span>
            <span class="font-sans text-[10px] uppercase tracking-widest mt-1 font-bold">شباك التذاكر</span>
        </a>
    <!-- Firebase SDK (Compat Version) -->
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore-compat.js"></script>
    
    <script src="firebase-init.js"></script>
    <script src="analytics.js"></script>
    <script src="movies.js"></script>
    <script src="app.js"></script>
</body>
</html>
